name: Roadworks ETL

on:
  schedule:
    # Twice daily: 7am and 7pm UTC
    - cron: '0 7,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-roadworks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run roadworks ETL
        run: python3 scripts/roadworks_etl.py public/data/roadworks.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/roadworks.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to roadworks data"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Roadworks data updated"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/roadworks.json
          git commit -m "data: refresh roadworks $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
