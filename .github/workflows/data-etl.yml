name: Data ETL Pipeline

on:
  schedule:
    # Twice daily: 6am and 6pm UTC (roadworks, FixMyStreet, LCC highways, traffic intelligence)
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-etl
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run roadworks ETL
        run: python3 scripts/roadworks_etl.py public/data/roadworks.json
        continue-on-error: true

      - name: Run FixMyStreet ETL
        run: python3 scripts/fixmystreet_etl.py public/data/fixmystreet.json
        continue-on-error: true

      - name: Run LCC highways ETL
        run: python3 scripts/lcc_highways_etl.py public/data/lcc_highways.json
        continue-on-error: true

      - name: Run traffic intelligence ETL
        run: python3 scripts/traffic_etl.py public/data/traffic.json
        continue-on-error: true

      - name: Summary
        run: |
          echo "### Data ETL Results" >> $GITHUB_STEP_SUMMARY
          for f in roadworks fixmystreet lcc_highways traffic; do
            if [ -f "public/data/${f}.json" ]; then
              SIZE=$(wc -c < "public/data/${f}.json" | tr -d ' ')
              echo "- **${f}.json**: ${SIZE} bytes" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **${f}.json**: missing" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to data files"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data files updated:"
            git diff --stat public/data/
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/roadworks.json public/data/fixmystreet.json public/data/lcc_highways.json public/data/traffic.json
          git commit -m "data: refresh all feeds $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
