name: Deploy tompickup.co.uk

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Deploy to tompickup23.github.io
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # Clone target repo with PAT auth, replace contents, push
          git clone --depth 1 "https://x-access-token:${DEPLOY_TOKEN}@github.com/tompickup23/tompickup23.github.io.git" /tmp/deploy-target
          # Remove old files but keep .git
          cd /tmp/deploy-target
          ls -A | grep -v '^\.git$' | xargs rm -rf
          # Copy new build
          cp -r $GITHUB_WORKSPACE/dist/* /tmp/deploy-target/
          # Commit and push
          cd /tmp/deploy-target
          git config user.name "tompickup.co.uk Deploy"
          git config user.email "deploy@tompickup.co.uk"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" || {
            git commit -m "deploy: ${{ github.event.head_commit.message }}"
            git push origin main
          }
