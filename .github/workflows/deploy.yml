name: Deploy tompickup.co.uk

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Deploy to tompickup23.github.io
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # Clear ALL credential helpers set by actions/checkout
          git config --global --unset-all credential.helper || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --system --unset-all credential.helper 2>/dev/null || true

          cd dist
          git init
          git config user.name "tompickup.co.uk Deploy"
          git config user.email "deploy@tompickup.co.uk"
          git config credential.helper '!f() { echo "password=${DEPLOY_TOKEN}"; }; f'
          git add -A
          git commit -m "deploy: ${{ github.event.head_commit.message }}"
          git push --force "https://x-access-token:${DEPLOY_TOKEN}@github.com/tompickup23/tompickup23.github.io.git" HEAD:main
