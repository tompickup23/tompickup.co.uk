name: Deploy tompickup.co.uk

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Deploy to tompickup23.github.io
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          npx gh-pages -d dist \
            --repo https://x-access-token:${DEPLOY_TOKEN}@github.com/tompickup23/tompickup23.github.io.git \
            --no-history \
            --user "tompickup.co.uk Deploy <deploy@tompickup.co.uk>"
