name: Deploy tompickup.co.uk

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Deploy to tompickup23.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: tompickup23/tompickup23.github.io
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
